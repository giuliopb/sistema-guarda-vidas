<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selecionar Posto</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* HEADER */

.header{
background:white;
border-bottom:1px solid #ddd;
}

.header-conteudo{
max-width:980px;
margin:0 auto;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-titulo{
margin:0;
font-size:22px;
}

.header-botao{
background:#1565c0;
color:#fff;
border:none;
border-radius:10px;
padding:10px 18px;
font-size:14px;
font-weight:bold;
cursor:pointer;
}

.header-botao:hover{
background:#0f4ea1;
}

/* LISTA */

.container{
padding:15px;
max-width:980px;
margin:0 auto;
}

.card{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:10px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
cursor:pointer;
}

.card:hover{
background:#f1f1f1;
}

.info{
display:flex;
align-items:center;
gap:12px;
}

.icone{
width:40px;
height:40px;
background:#1976d2;
color:white;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
font-size:18px;
}

.nome{
font-weight:bold;
}

.sub{
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="header">
<div class="header-conteudo">
<h1 class="header-titulo">Escolha um Posto</h1>
<button class="header-botao" onclick="voltar()">Voltar</button>
</div>
</div>


<div class="container" id="listaPostos">

</div>


<script>

const usuario = localStorage.getItem("usuario_id")

if(!usuario){

window.location="login.html"

}





function formatarDataHoraBrasilia(dataIso){

if(!dataIso) return "Nunca"

const data = new Date(dataIso)

if(Number.isNaN(data.getTime())) return "Nunca"

const partes = new Intl.DateTimeFormat("pt-BR", {

timeZone:"America/Sao_Paulo",

hour12:false,

hour:"2-digit",

minute:"2-digit",

day:"2-digit",

month:"2-digit",

year:"numeric"

}).formatToParts(data)

const valores = Object.fromEntries(

partes

.filter((p) => p.type !== "literal")

.map((p) => [p.type, p.value])

)

return `${valores.hour}:${valores.minute} ${valores.day}/${valores.month}/${valores.year}`

}


async function carregarPostos(){

const res = await fetch("/dashboard/postos")

const postos = await res.json()

const lista = document.getElementById("listaPostos")

lista.innerHTML=""

postos.forEach(p=>{

const card = document.createElement("div")

card.className="card"

card.onclick = () => abrirPosto(p.id)

card.innerHTML = `

<div class="info">

<div class="icone">🏖</div>

<div>

<div class="nome">${p.nome}</div>

<div class="sub">
Última conferência: 
${formatarDataHoraBrasilia(p.ultima_conferencia)}
</div>

</div>

</div>

<div>⋮</div>

`

lista.appendChild(card)

})

}



function abrirPosto(id){

localStorage.setItem("posto_id",id)

window.location="divisoes.html"

}



function voltar(){

window.location="index.html"

}



carregarPostos()

</script>

</body>
</html>
