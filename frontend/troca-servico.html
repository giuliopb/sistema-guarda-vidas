<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troca de Serviço</title>
<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
.header{background:#fff;border-bottom:1px solid #ddd}
.header-conteudo{max-width:820px;margin:0 auto;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.header-titulo{margin:0;font-size:22px}
.header-botao{background:#1565c0;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:bold;cursor:pointer}
.header-botao:hover{background:#0f4ea1}
.container{max-width:820px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.field{margin-bottom:10px}
label{display:block;font-size:14px;margin-bottom:5px}
input,select,button{padding:10px;border-radius:8px;border:1px solid #ccc;width:100%;box-sizing:border-box}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.actions{display:flex;gap:10px;margin-top:12px}
.actions button{width:auto;border:none;cursor:pointer}
.primary{background:#1565c0;color:#fff}
.muted{color:#666;font-size:13px}
.troca-item{border:1px solid #e3e7ee;border-radius:10px;padding:10px;margin-top:8px;background:#fafcff}
.status{display:inline-block;padding:3px 8px;border-radius:14px;font-size:12px;color:#fff}
.status-pendente{background:#f9a825}
.status-autorizada{background:#2e7d32}
.status-negada{background:#c62828}
.paginacao{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
@media (max-width: 700px){ .row{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="header">
  <div class="header-conteudo">
    <h1 class="header-titulo">Troca de Serviço</h1>
    <button class="header-botao" onclick="voltar()">Voltar</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h3 style="margin-top:0">Nova troca de serviço</h3>

    <div class="field">
      <label>Com quem será a troca de serviço</label>
      <select id="usuarioTroca"></select>
    </div>

    <div class="row">
      <div class="field">
        <label>Dia que irá passar o serviço</label>
        <input type="date" id="dataCedida">
      </div>
      <div class="field">
        <label>Carga horária (serviço cedido)</label>
        <select id="cargaCedida">
          <option value="6">6h</option>
          <option value="12" selected>12h</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Posto do serviço cedido</label>
      <select id="postoCedido"></select>
    </div>

    <div class="field">
      <label>Dia que irá trabalhar de volta</label>
      <select id="tipoRetorno" onchange="alternarRetorno()">
        <option value="sim">Informar retorno</option>
        <option value="nenhum">Nenhum</option>
      </select>
    </div>

    <div id="blocoRetorno">
      <div class="row">
        <div class="field">
          <label>Dia de retorno</label>
          <input type="date" id="dataRetorno">
        </div>
        <div class="field">
          <label>Carga horária (retorno)</label>
          <select id="cargaRetorno">
            <option value="6">6h</option>
            <option value="12" selected>12h</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Posto do retorno</label>
        <select id="postoRetorno"></select>
      </div>
    </div>

    <div class="actions">
      <button class="primary" onclick="enviarSolicitacao()">Enviar solicitação</button>
      <button onclick="voltar()">Cancelar</button>
    </div>
  </div>

  <div class="card" style="margin-top:14px">
    <h3 style="margin-top:0">Trocas solicitadas</h3>
    <div id="historicoTrocas">Carregando...</div>
    <div class="paginacao">
      <button onclick="paginaAnterior()">← Anterior</button>
      <small id="paginaInfo">Página 1</small>
      <button onclick="proximaPagina()">Próxima →</button>
    </div>
  </div>
</div>

<script>
const usuarioId = localStorage.getItem('usuario_id');
if(!usuarioId){ window.location='login.html'; }
let paginaAtual = 1;
let totalPaginas = 1;

async function carregarUsuarios(){
  const res = await fetch(`/trocas/usuarios?solicitante_id=${usuarioId}`);
  const usuarios = await res.json();
  const select = document.getElementById('usuarioTroca');
  select.innerHTML = '';

  if(!Array.isArray(usuarios) || !usuarios.length){
    select.innerHTML = '<option value=\"\">Nenhum usuário disponível</option>';
    return;
  }

  usuarios.forEach((u) => {
    const option = document.createElement('option');
    option.value = u.id;
    option.textContent = u.nome;
    select.appendChild(option);
  });
}

async function carregarPostos(){
  const res = await fetch('/postos');
  const postos = await res.json();
  const cedido = document.getElementById('postoCedido');
  const retorno = document.getElementById('postoRetorno');
  cedido.innerHTML = '';
  retorno.innerHTML = '';

  postos.forEach((p) => {
    const op1 = document.createElement('option');
    op1.value = p.id;
    op1.textContent = p.nome;
    cedido.appendChild(op1);

    const op2 = document.createElement('option');
    op2.value = p.id;
    op2.textContent = p.nome;
    retorno.appendChild(op2);
  });
}

function alternarRetorno(){
  const tipo = document.getElementById('tipoRetorno').value;
  document.getElementById('blocoRetorno').style.display = tipo === 'nenhum' ? 'none' : 'block';
}

async function enviarSolicitacao(){
  const tipoRetorno = document.getElementById('tipoRetorno').value;
  const payload = {
    solicitante_id: Number(usuarioId),
    usuario_troca_id: Number(document.getElementById('usuarioTroca').value),
    data_servico_cedido: document.getElementById('dataCedida').value,
    posto_cedido_id: Number(document.getElementById('postoCedido').value),
    carga_horaria_cedida: Number(document.getElementById('cargaCedida').value),
    possui_retorno: tipoRetorno !== 'nenhum',
    data_retorno: tipoRetorno !== 'nenhum' ? document.getElementById('dataRetorno').value : null,
    posto_retorno_id: tipoRetorno !== 'nenhum' ? Number(document.getElementById('postoRetorno').value) : null,
    carga_horaria_retorno: tipoRetorno !== 'nenhum' ? Number(document.getElementById('cargaRetorno').value) : null
  };

  const res = await fetch('/trocas', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.erro || 'Não foi possível enviar a solicitação');
    return;
  }

  alert('Solicitação enviada com sucesso!');
  paginaAtual = 1;
  carregarHistoricoTrocas();
}

function voltar(){ window.location='index.html'; }

function formatarData(dataIso){
  if(!dataIso) return '-';
  const data = new Date(dataIso);
  if(Number.isNaN(data.getTime())) return '-';
  const [ano, mes, dia] = dataIso.substring(0,10).split('-');
  return `${dia}/${mes}/${ano}`;
}

function classeStatus(status){
  if(status === 'autorizada') return 'status status-autorizada';
  if(status === 'negada') return 'status status-negada';
  return 'status status-pendente';
}

async function carregarHistoricoTrocas(){
  const res = await fetch(`/trocas/minhas?usuario_id=${usuarioId}&page=${paginaAtual}`);
  const data = await res.json();
  const container = document.getElementById('historicoTrocas');
  container.innerHTML = '';

  if(!res.ok){
    container.innerText = data.erro || 'Não foi possível carregar as trocas solicitadas.';
    return;
  }

  totalPaginas = Number(data.total_paginas || 1);
  document.getElementById('paginaInfo').innerText = `Página ${paginaAtual} de ${totalPaginas}`;

  if(!Array.isArray(data.trocas) || !data.trocas.length){
    container.innerHTML = '<p>Nenhuma troca encontrada.</p>';
    return;
  }

  data.trocas.forEach((troca) => {
    const div = document.createElement('div');
    div.className = 'troca-item';
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap">
        <b>${troca.solicitante_nome} ↔ ${troca.usuario_troca_nome}</b>
        <span class="${classeStatus(troca.status)}">${troca.status}</span>
      </div>
      <small><b>Solicitada em:</b> ${formatarData(troca.criada_em)}</small><br>
      <small><b>Serviço cedido:</b> ${formatarData(troca.data_servico_cedido)} | ${troca.carga_horaria_cedida}h | ${troca.posto_cedido_nome}</small><br>
      <small><b>Retorno:</b> ${troca.possui_retorno ? `${formatarData(troca.data_retorno)} | ${troca.carga_horaria_retorno}h | ${troca.posto_retorno_nome}` : 'Nenhum'}</small>
    `;
    container.appendChild(div);
  });
}

function paginaAnterior(){
  if(paginaAtual <= 1) return;
  paginaAtual -= 1;
  carregarHistoricoTrocas();
}

function proximaPagina(){
  if(paginaAtual >= totalPaginas) return;
  paginaAtual += 1;
  carregarHistoricoTrocas();
}

carregarUsuarios();
carregarPostos();
alternarRetorno();
carregarHistoricoTrocas();
</script>
</body>
</html>
