<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>
<style>
body{font-family:Arial;background:#eef2f5;margin:0}
.wrap{max-width:1100px;margin:0 auto;padding:20px}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
.btn-primary{background:#1e88e5;color:#fff}
.btn-danger{background:#e53935;color:#fff}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:14px}
.list-item{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid #ececec}
.list-item:last-child{border-bottom:none}
.tag{padding:3px 8px;border-radius:20px;background:#eee;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Painel do Administrador</h1>

  <div class="card">
    <div class="row">
      <button class="btn-primary" onclick="window.location='cadastro-posto.html'">Cadastrar postos</button>
      <button class="btn-primary" onclick="window.location='tarefas-diarias.html'">Adicionar tarefa diária</button>
      <button class="btn-danger" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="card">
    <h3>Tarefa diária de hoje</h3>
    <p id="tarefaDiariaHoje">Carregando...</p>
  </div>

  <div class="card">
    <h3>Conferência dos postos</h3>
    <div id="conferencias">Carregando...</div>
  </div>

  <div class="card">
    <h3>Problemas reportados pelos guarda-vidas</h3>
    <div id="alteracoes">Carregando...</div>
  </div>
</div>

<script>
if(localStorage.getItem('usuario_tipo') !== 'admin'){ window.location='login.html'; }

async function carregarConferencias(){
  const resposta = await fetch('/dashboard/postos');
  const postos = await resposta.json();
  const container = document.getElementById('conferencias');
  container.innerHTML = '';

  if(!postos.length){ container.innerHTML = '<p>Nenhum posto cadastrado.</p>'; return; }

  postos.forEach((p) => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `<div><b>${p.nome}</b><br><small>Última conferência: ${p.ultima_conferencia || 'Nunca'} | Guarda-vidas: ${p.ultimo_usuario || '-'}</small></div>`;
    container.appendChild(div);
  });
}

async function carregarTarefaDiariaHoje(){
  try{
    const res = await fetch('/tarefas/ativa');
    const tarefa = await res.json();
    const alvo = document.getElementById('tarefaDiariaHoje');

    if(!tarefa){
      alvo.innerText = 'Nenhuma tarefa diária cadastrada para hoje.';
      return;
    }

    alvo.innerText = `${tarefa.nome || 'Tarefa'}: ${tarefa.descricao}`;
  }catch(e){
    document.getElementById('tarefaDiariaHoje').innerText = 'Não foi possível carregar a tarefa diária.';
  }
}

async function carregarAlteracoes(){
  const res = await fetch('/dashboard/alteracoes');
  const alteracoes = await res.json();
  const container = document.getElementById('alteracoes');
  container.innerHTML = '';

  if(!alteracoes.length){ container.innerHTML = '<p>Sem problemas pendentes.</p>'; return; }

  alteracoes.forEach((a) => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <div>
        <b>${a.posto_nome} / ${a.divisao_nome}</b> - ${a.item_nome}<br>
        <small>${a.descricao} | Qtd encontrada: ${a.quantidade_encontrada ?? '-'} / padrão: ${a.quantidade_padrao}</small>
      </div>
      <div>
        <span class="tag">${a.status}</span>
        <button onclick="atualizarProblema(${a.id})">Atualizar</button>
      </div>
    `;
    container.appendChild(div);
  });
}

async function atualizarProblema(id){
  const status = prompt('Novo status (pendente, em_correcao, resolvido):', 'em_correcao');
  if(!status) return;
  const resolucao = prompt('Observação de atualização (opcional):', '');

  await fetch(`/dashboard/alteracoes/${id}`, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({status, resolucao})
  });

  carregarAlteracoes();
}

function logout(){ localStorage.clear(); window.location='login.html'; }

carregarTarefaDiariaHoje();
carregarConferencias();
carregarAlteracoes();
</script>
</body>
</html>
