<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Administrador</title>

<style>

body{

font-family:Arial;
background:#eef2f5;
padding:30px;

}

.container{

max-width:900px;
margin:auto;

}

.posto{

padding:15px;
margin-bottom:15px;
border-radius:8px;
color:white;
cursor:pointer;

}

.verde{

background:#2e7d32;

}

.vermelho{

background:#c62828;

}

</style>

</head>

<body>

<div class="container">

<h1>Postos de Guarda-Vidas</h1>

<div id="postos"></div>

</div>

<script>

async function carregarDashboard(){

const resposta = await fetch("http://localhost:3000/dashboard/postos")

const postos = await resposta.json()

const container = document.getElementById("postos")

container.innerHTML = ""

postos.forEach(p => {

const div = document.createElement("div")

div.className = "posto"

if(p.ultima_conferencia){

div.classList.add("verde")

}else{

div.classList.add("vermelho")

}

div.innerHTML = `

<h3>${p.nome}</h3>

Última conferência: ${p.ultima_conferencia || "Nunca"}

Guarda-vidas: ${p.ultimo_usuario || "-"}

`

container.appendChild(div)

})

}

carregarDashboard()

</script>

</body>

</html>
