<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>
<style>
body{font-family:Arial;background:#eef2f5;margin:0}
.wrap{max-width:1100px;margin:0 auto;padding:20px}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
.btn-primary{background:#1e88e5;color:#fff}
.btn-danger{background:#e53935;color:#fff}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:14px}
.list-item{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid #ececec}
.list-item:last-child{border-bottom:none}
.tarefa-item{margin:10px 0;padding:12px;border:1px solid #e3e7ee;border-radius:10px;background:#f9fbff}
.tarefa-titulo{font-weight:bold;font-size:18px;margin-bottom:6px}
.tarefa-desc{display:block;color:#444;margin-bottom:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Painel do Administrador</h1>

  <div class="card">
    <div class="row">
      <button class="btn-primary" onclick="window.location='cadastro-posto.html'">Cadastrar postos</button>
      <button class="btn-primary" onclick="window.location='cadastros.html'">Cadastros</button>
      <button class="btn-primary" onclick="window.location='tarefas-diarias.html'">Adicionar tarefa diária</button>
      <button class="btn-primary" onclick="window.location='trocas-admin.html'" id="btnTrocas">Solicitações de troca (0)</button>
      <button class="btn-danger" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="card">
    <h3>Trocas autorizadas</h3>
    <div id="trocasAutorizadas">Carregando...</div>
  </div>

  <div class="card">
    <h3>Problemas reportados pelos guarda-vidas</h3>
    <div id="alteracoes">Carregando...</div>
  </div>

  <div class="card">
    <h3>Conferência dos postos</h3>
    <div id="conferencias">Carregando...</div>
  </div>

  <div class="card">
    <h3>Tarefa diária de hoje</h3>
    <div id="tarefasDiariasHoje">Carregando...</div>
  </div>
</div>

<script>
if(localStorage.getItem('usuario_tipo') !== 'admin'){ window.location='login.html'; }

function formatarDataHoraBrasilia(dataIso){
  if(!dataIso) return 'Nunca';
  const data = new Date(dataIso);
  if(Number.isNaN(data.getTime())) return 'Nunca';

  const partes = new Intl.DateTimeFormat('pt-BR', {
    timeZone: 'America/Sao_Paulo',
    hour12: false,
    hour: '2-digit',
    minute: '2-digit',
    day: '2-digit',
    month: '2-digit',
    year: 'numeric'
  }).formatToParts(data);

  const valores = Object.fromEntries(
    partes
      .filter((p) => p.type !== 'literal')
      .map((p) => [p.type, p.value])
  );

  return `${valores.hour}:${valores.minute} ${valores.day}/${valores.month}/${valores.year}`;
}

async function carregarConferencias(){
  const resposta = await fetch('/dashboard/postos');
  const postos = await resposta.json();
  const container = document.getElementById('conferencias');
  container.innerHTML = '';

  if(!postos.length){ container.innerHTML = '<p>Nenhum posto cadastrado.</p>'; return; }

  postos.forEach((p) => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `<div><b>${p.nome}</b><br><small>Última conferência: ${formatarDataHoraBrasilia(p.ultima_conferencia)} | Guarda-vidas: ${p.ultimo_usuario || '-'}</small></div>`;
    container.appendChild(div);
  });
}

async function carregarTrocasPendentesCount(){
  try{
    const res = await fetch('/trocas/pendentes/count');
    const data = await res.json();
    const total = Number(data.total || 0);
    document.getElementById('btnTrocas').innerText = `Solicitações de troca (${total})`;
  }catch(e){
    document.getElementById('btnTrocas').innerText = 'Solicitações de troca';
  }
}

async function carregarTrocasAutorizadasHoje(){
  try{
    const res = await fetch('/trocas/hoje');
    const trocas = await res.json();
    const container = document.getElementById('trocasAutorizadas');
    container.innerHTML = '';

    if(!Array.isArray(trocas) || !trocas.length){
      container.innerHTML = '<p>Sem trocas autorizadas para hoje.</p>';
      return;
    }

    trocas.forEach((troca) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `<div>${troca.mensagem}</div>`;
      container.appendChild(item);
    });
  }catch(e){
    document.getElementById('trocasAutorizadas').innerHTML = '<p>Não foi possível carregar as trocas autorizadas.</p>';
  }
}

async function carregarTarefaDiariaHoje(){
  try{
    const res = await fetch('/tarefas/hoje');
    const tarefas = await res.json();
    const alvo = document.getElementById('tarefasDiariasHoje');

    if(!Array.isArray(tarefas) || !tarefas.length){
      alvo.innerText = 'Nenhuma tarefa diária cadastrada para hoje.';
      return;
    }

    alvo.innerHTML = tarefas.map((tarefa) => `
      <div class="tarefa-item">
        <div class="tarefa-titulo">${tarefa.nome || 'Tarefa'}</div>
        <small class="tarefa-desc">${tarefa.descricao}</small>
        <small><b>Postos:</b> ${tarefa.postos_texto || '-'}</small>
      </div>
    `).join('');
  }catch(e){
    document.getElementById('tarefasDiariasHoje').innerText = 'Não foi possível carregar as tarefas diárias.';
  }
}

async function carregarAlteracoes(){
  const res = await fetch('/dashboard/alteracoes');
  const alteracoes = await res.json();
  const container = document.getElementById('alteracoes');
  container.innerHTML = '';

  if(!alteracoes.length){ container.innerHTML = '<p>Sem problemas pendentes.</p>'; return; }

  alteracoes.forEach((a) => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <div>
        <b>${a.posto_nome} / ${a.divisao_nome}</b> - ${a.item_nome}<br>
        <small>${a.descricao} | Qtd encontrada: ${a.quantidade_encontrada ?? '-'} / padrão: ${a.quantidade_padrao}</small>
      </div>
      <div>
        <button onclick="resolverProblema(${a.id})">Resolvido</button>
      </div>
    `;
    container.appendChild(div);
  });
}

async function resolverProblema(id){
  await fetch(`/dashboard/alteracoes/${id}/resolver`, { method:'PUT' });
  carregarAlteracoes();
}

function logout(){ localStorage.clear(); window.location='login.html'; }

carregarTarefaDiariaHoje();
carregarConferencias();
carregarAlteracoes();
carregarTrocasPendentesCount();
carregarTrocasAutorizadasHoje();
</script>
</body>
</html>
