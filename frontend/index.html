<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Guarda-Vidas</title>
<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
.header{background:#fff;padding:12px 16px;display:flex;justify-content:space-between;border-bottom:1px solid #ddd}
.container{padding:16px;max-width:800px;margin:0 auto}
.acoes{display:flex;gap:10px;margin:14px 0}
.botao,.botao-sec{
  color:#fff;
  padding:14px;
  border:none;
  border-radius:10px;
  width:100%;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}
.botao{background:#e53935}
.botao-sec{background:#1565c0}
.card{background:#fff;padding:14px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.12);margin-top:16px}
.small{color:#666}
.tarefa-item{margin:10px 0;padding:12px;border:1px solid #e3e7ee;border-radius:10px;background:#f9fbff}
.tarefa-titulo{font-weight:bold;font-size:18px;margin-bottom:6px}
.tarefa-desc{display:block;color:#444;margin-bottom:6px}
</style>
</head>
<body>
<div class="header">
  <div><b>GUARDA-VIDAS</b></div>
  <button onclick="logout()">Sair</button>
</div>
<div class="container">
  <div class="small">Bem-vindo</div>
  <h2 id="usuarioNome"></h2>

  <div class="acoes">
    <button class="botao" onclick="abrirConferencia()">Iniciar Conferência</button>
    <button class="botao-sec" onclick="abrirTrocaServico()">Troca de Serviço</button>
  </div>

  <div class="card">
    <h3>Tarefa diária</h3>
    <div id="tarefasHoje">Carregando...</div>
  </div>
</div>

<script>
const usuario = localStorage.getItem('usuario_id');
const usuarioNome = localStorage.getItem('usuario_nome');
if(!usuario){ window.location='login.html'; }
document.getElementById('usuarioNome').innerText = usuarioNome || 'Guarda-vidas';

async function carregarTarefaDiaria(){
  try{
    const res = await fetch('/tarefas/hoje');
    const tarefas = await res.json();
    const container = document.getElementById('tarefasHoje');

    if(!Array.isArray(tarefas) || !tarefas.length){
      container.innerText = 'Nenhuma tarefa diária cadastrada para hoje.';
      return;
    }

    container.innerHTML = tarefas.map((tarefa) => `
      <div class="tarefa-item">
        <div class="tarefa-titulo">${tarefa.nome || 'Tarefa'}</div>
        <small class="tarefa-desc">${tarefa.descricao}</small>
        <small><b>Postos:</b> ${tarefa.postos_texto || '-'}</small>
      </div>
    `).join('');
  }catch(e){
    document.getElementById('tarefasHoje').innerText = 'Não foi possível carregar as tarefas diárias.';
  }
}

function abrirConferencia(){ window.location='conferencia.html'; }
function abrirTrocaServico(){ window.location='troca-servico.html'; }
function logout(){ localStorage.clear(); window.location='login.html'; }

carregarTarefaDiaria();
</script>
</body>
</html>
