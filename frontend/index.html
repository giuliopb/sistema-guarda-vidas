<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guarda-Vidas</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* HEADER */

.header{
background:white;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ddd;
}

.logo{
color:#d32f2f;
font-weight:bold;
font-size:18px;
}

/* CONTEÚDO */

.container{
padding:16px;
}

.bemvindo{
margin-bottom:10px;
color:#666;
}

.nome{
font-size:18px;
font-weight:bold;
}

/* BOTÃO PRINCIPAL */

.botao-principal{
background:#e53935;
color:white;
padding:18px;
border-radius:10px;
font-size:20px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
margin:20px 0;
}

.botao-principal span{
font-size:28px;
}

/* ATALHOS */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:20px;
}

.card{
background:white;
padding:12px;
border-radius:8px;
text-align:center;
font-size:13px;
box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

/* TAREFAS */

.titulo{
font-weight:bold;
margin:10px 0;
}

.tarefa{
background:white;
padding:12px;
border-radius:8px;
margin-bottom:10px;
box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

.tarefa small{
color:#666;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">GUARDA-VIDAS</div>

<div>☰</div>

</div>


<div class="container">

<div class="bemvindo">Bem-vindo</div>

<div class="nome" id="usuarioNome"></div>


<div class="botao-principal" onclick="abrirConferencia()">

<div>Iniciar Conferência</div>

<span>＋</span>

</div>


<div class="grid">

<div class="card">Postos</div>
<div class="card">Equipamentos</div>
<div class="card">Histórico</div>
<div class="card">Perfil</div>

</div>


<div class="titulo">Tarefas de hoje</div>

<div class="tarefa">

<b>Conferir Posto</b>

<br>

<small>Realizar checklist completo do posto.</small>

</div>


</div>


<script>

const usuario = localStorage.getItem("usuario_id")
const usuarioNome = localStorage.getItem("usuario_nome")

if(!usuario){

window.location="login.html"

}

document.getElementById("usuarioNome").innerText = usuarioNome


function abrirConferencia(){

window.location="conferencia.html"

}

</script>

</body>
</html>
