<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist</title>
<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
.header{background:#fff;padding:14px;display:flex;gap:10px;border-bottom:1px solid #ddd}
.container{padding:15px;max-width:900px;margin:0 auto}
.item{background:#fff;border-radius:10px;padding:15px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
input,textarea,button{padding:8px;border-radius:6px;border:1px solid #ccc}
button{cursor:pointer;border:none}
.ok{background:#43a047;color:#fff}
.prob{background:#fb8c00;color:#fff}
.finalizar{background:#1565c0;color:#fff;width:100%;padding:12px;font-size:16px}
.warn{color:#d84315;font-weight:bold}
</style>
</head>
<body>
<div class="header">
  <div onclick="voltar()" style="cursor:pointer">←</div>
  <div>Checklist da divisão</div>
</div>
<div class="container">
  <div id="lista"></div>
  <button class="finalizar" id="btnFinalizar" onclick="concluirDivisao()" disabled>Concluir divisão</button>
</div>

<script>
const usuario = localStorage.getItem('usuario_id');
const posto = localStorage.getItem('posto_id');
const divisao = localStorage.getItem('divisao_id');

let itens = [];
const revisados = new Set();
const alteracoes = new Map();

async function carregarItens(){
  const res = await fetch('/divisoes/'+divisao+'/itens');
  itens = await res.json();

  const lista = document.getElementById('lista');
  lista.innerHTML='';

  itens.forEach((i) => {
    const item = document.createElement('div');
    item.className='item';
    item.innerHTML = `
      <div><b>${i.nome}</b></div>
      <div>Quantidade padrão: <b>${i.quantidade_padrao}</b> <span id="flag-${i.id}" class="warn"></span></div>
      <div class="row">
        <label>Quantidade encontrada:</label>
        <input type="number" id="qtd-${i.id}" value="${i.quantidade_padrao}" min="0" onchange="avaliarQuantidade(${i.id}, ${i.quantidade_padrao})">
      </div>
      <div class="row">
        <button class="ok" onclick="marcarOk(${i.id})">Marcar OK</button>
        <button class="prob" onclick="reportarAlteracao(${i.id})">Reportar alteração</button>
      </div>
      <div class="row">
        <textarea id="desc-${i.id}" rows="2" style="width:100%" placeholder="Descreva avaria/problema (opcional)"></textarea>
      </div>
    `;
    lista.appendChild(item);
  });
}

function avaliarQuantidade(itemId, padrao){
  const qtd = Number(document.getElementById(`qtd-${itemId}`).value || 0);
  const flag = document.getElementById(`flag-${itemId}`);

  if(qtd < padrao){
    flag.innerText = '⚠ Quantidade abaixo do padrão';
  }else{
    flag.innerText = '';
  }
}

function marcarOk(itemId){
  registrarAlteracaoItem(itemId);
  revisados.add(itemId);
  atualizarBotaoFinalizar();
  alert('Item marcado como revisado.');
}

function reportarAlteracao(itemId){
  registrarAlteracaoItem(itemId);
  revisados.add(itemId);
  atualizarBotaoFinalizar();
  alert('Alteração registrada no item.');
}

function registrarAlteracaoItem(itemId){
  const item = itens.find((it) => it.id === itemId);
  const qtd = Number(document.getElementById(`qtd-${itemId}`).value || 0);
  const desc = document.getElementById(`desc-${itemId}`).value.trim();

  const payload = {
    item_id: itemId,
    quantidade_encontrada: qtd,
    descricao: desc
  };

  const abaixoPadrao = qtd < Number(item.quantidade_padrao || 0);
  if(abaixoPadrao || desc){
    alteracoes.set(itemId, payload);
  } else {
    alteracoes.delete(itemId);
  }
}

function atualizarBotaoFinalizar(){
  const pronto = revisados.size === itens.length && itens.length > 0;
  document.getElementById('btnFinalizar').disabled = !pronto;
}

async function concluirDivisao(){
  const body = {
    posto_id: posto,
    divisao_id: divisao,
    usuario_id: usuario,
    alteracoes: Array.from(alteracoes.values())
  };

  const res = await fetch('/divisoes/conferir', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.erro || 'Erro ao concluir divisão');
    return;
  }

  alert(data.mensagem || 'Divisão conferida');
  window.location='divisoes.html';
}

function voltar(){ window.location='divisoes.html'; }

carregarItens();
</script>
</body>
</html>
