<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conferência de Itens</title>
<style>
:root{
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#2f2f2f;
  --muted:#8b8b8b;
  --ok:#1f9d55;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.topbar{height:56px;display:flex;align-items:center;gap:10px;padding:0 12px;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:10}
.back{font-size:22px;cursor:pointer}
.title{font-size:14px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.container{padding:15px 15px 88px 15px}
.item-card{
  background:var(--card);
  border-radius:10px;
  padding:15px;
  margin-bottom:10px;
  border:1px solid transparent;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  transition:background .2s ease,border-color .2s ease;
  cursor:pointer;
}
.item-card.conferido{
  background:#e8f5e9;
  border-color:#4caf50;
}
.item-main{display:flex;align-items:center;gap:10px}
.name{flex:1;font-size:17px;color:#1d1d1d;font-weight:bold}
.item-card.conferido .name{color:var(--ok)}
.switch{position:relative;display:inline-block;width:46px;height:26px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#bcbcbc;transition:.25s;border-radius:26px}
.slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:#fff;transition:.25s;border-radius:50%}
input:checked + .slider{background:var(--ok)}
input:checked + .slider:before{transform:translateX(20px)}
.link{margin-top:8px;font-size:13px;color:#4f4f4f;text-decoration:underline;cursor:pointer;display:inline-block}
.details{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed #cfcfcf}
.details.show{display:block}
.row{display:flex;gap:8px;align-items:center}
input[type="number"],textarea{width:100%;border:1px solid #c6c6c6;border-radius:8px;padding:8px;background:#fff}
.warn{font-size:12px;color:#c62828;margin-top:4px;display:none}
.warn.show{display:block}
.btn-secondary{border:none;background:#666;color:#fff;padding:8px 10px;border-radius:8px;cursor:pointer}
.alert-link{margin-top:6px;font-size:13px;background:none;border:none;color:#c62828;text-decoration:underline;cursor:pointer;padding:0}
.toast{
  position:fixed;
  left:50%;
  bottom:74px;
  transform:translateX(-50%);
  background:#1f9d55;
  color:#fff;
  font-size:13px;
  padding:8px 12px;
  border-radius:20px;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
}
.toast.show{opacity:1}
</style>
</head>
<body>
  <div class="topbar">
    <div class="back" onclick="voltar()">←</div>
    <div class="title">Conferência de itens da divisão</div>
  </div>

  <div class="container" id="lista"></div>
  <div class="toast" id="toast"></div>

<script>
const usuario = localStorage.getItem('usuario_id');
const posto = localStorage.getItem('posto_id');
const divisao = localStorage.getItem('divisao_id');

let itens = [];
const revisados = new Set();
const alteracoes = new Map();
let finalizandoDivisao = false;

async function carregarItens(){
  const res = await fetch('/divisoes/'+divisao+'/itens');
  const data = await res.json();

  if(!res.ok){
    alert(data.erro || 'Erro ao carregar itens');
    return;
  }

  itens = data;

  const lista = document.getElementById('lista');
  lista.innerHTML='';

  itens.forEach((i) => {
    const card = document.createElement('div');
    card.className='item-card';
    card.onclick = () => marcarConferencia(i.id);
    card.innerHTML = `
      <div class="item-main">
        <div class="name" id="label-${i.id}">${Number(i.quantidade_atual ?? i.quantidade_padrao || 0)}x ${i.nome}</div>
        <label class="switch">
          <input type="checkbox" id="ok-${i.id}" onchange="toggleRevisado(${i.id})">
          <span class="slider"></span>
        </label>
      </div>

      <button class="alert-link" id="alert-${i.id}" style="display:none" onclick="abrirAlteracao(${i.id}, event)">!! ver alteração</button>

      <span class="link" onclick="toggleDetalhes(${i.id}, event)">reportar problema / quantidade</span>

      <div class="details" id="details-${i.id}" onclick="event.stopPropagation()">
        <div class="row">
          <label style="font-size:13px">Qtd padrão: <b>${i.quantidade_padrao}</b> | atual: <b>${i.quantidade_atual ?? i.quantidade_padrao}</b></label>
        </div>
        <div class="row" style="margin-top:6px">
          <input type="number" id="qtd-${i.id}" min="0" value="${i.quantidade_atual ?? i.quantidade_padrao}" oninput="avaliarQuantidade(${i.id}, ${i.quantidade_padrao})">
        </div>
        <div class="warn" id="warn-${i.id}">Quantidade abaixo do padrão.</div>
        <div class="row" style="margin-top:6px">
          <textarea id="desc-${i.id}" rows="2" placeholder="Descreva avaria/problema"></textarea>
        </div>
        <div class="row" style="margin-top:6px">
          <button class="btn-secondary" onclick="salvarAlteracaoItem(${i.id}, {}, event)">Salvar alteração</button>
        </div>
      </div>
    `;
    lista.appendChild(card);
  });
}

function toggleDetalhes(itemId, event){
  event.stopPropagation();
  const box = document.getElementById(`details-${itemId}`);
  box.classList.toggle('show');
}

function marcarConferencia(itemId){
  const check = document.getElementById(`ok-${itemId}`);
  check.checked = !check.checked;
  toggleRevisado(itemId);
}

function abrirAlteracao(itemId, event){
  event.stopPropagation();
  const box = document.getElementById(`details-${itemId}`);
  box.classList.add('show');
}

function toggleRevisado(itemId){
  const check = document.getElementById(`ok-${itemId}`);
  const card = check.closest('.item-card');
  if(check.checked){
    revisados.add(itemId);
    card.classList.add('conferido');
    salvarAlteracaoItem(itemId, { exibirFeedback: false });
  }else{
    revisados.delete(itemId);
    card.classList.remove('conferido');
  }
  atualizarBotaoFinalizar();
}

function avaliarQuantidade(itemId, padrao){
  const qtd = Number(document.getElementById(`qtd-${itemId}`).value || 0);
  const warn = document.getElementById(`warn-${itemId}`);
  if(qtd < padrao){ warn.classList.add('show'); }
  else { warn.classList.remove('show'); }
  atualizarTituloItem(itemId);
}

function atualizarTituloItem(itemId){
  const item = itens.find((it) => it.id === itemId);
  if(!item) return;
  const qtd = Number(document.getElementById(`qtd-${itemId}`).value || 0);
  document.getElementById(`label-${itemId}`).innerText = `${qtd}x ${item.nome}`;
}

function salvarAlteracaoItem(itemId, options = {}, event){
  if(event){ event.stopPropagation(); }
  const { exibirFeedback = true } = options;
  const item = itens.find((it) => it.id === itemId);
  const qtd = Number(document.getElementById(`qtd-${itemId}`).value || 0);
  const desc = document.getElementById(`desc-${itemId}`).value.trim();
  const check = document.getElementById(`ok-${itemId}`);
  const card = check.closest('.item-card');
  const abaixoPadrao = qtd < Number(item.quantidade_padrao || 0);
  const alertBtn = document.getElementById(`alert-${itemId}`);

  if(abaixoPadrao || desc){
    alteracoes.set(itemId, {
      item_id: itemId,
      quantidade_encontrada: qtd,
      descricao: desc
    });
  } else {
    alteracoes.delete(itemId);
  }

  alertBtn.style.display = alteracoes.has(itemId) ? 'inline-block' : 'none';

  check.checked = true;
  revisados.add(itemId);
  card.classList.add('conferido');
  atualizarBotaoFinalizar();

  if(exibirFeedback){
    mostrarFeedback('Alteração salva e item marcado como conferido.');
  }
}

function atualizarBotaoFinalizar(){
  const pronto = itens.length > 0 && revisados.size === itens.length;
  if(pronto && !finalizandoDivisao){
    concluirDivisao();
  }
}

async function concluirDivisao(){
  if(finalizandoDivisao){ return; }
  finalizandoDivisao = true;
  const body = {
    posto_id: posto,
    divisao_id: divisao,
    usuario_id: usuario,
    alteracoes: Array.from(alteracoes.values())
  };

  const res = await fetch('/divisoes/conferir', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });

  const data = await res.json();
  if(!res.ok){
    finalizandoDivisao = false;
    alert(data.erro || 'Erro ao concluir divisão');
    return;
  }

  alert(data.mensagem || 'Divisão conferida');
  window.location='divisoes.html';
}

function voltar(){ window.location='divisoes.html'; }

let toastTimeout;
function mostrarFeedback(texto){
  const toast = document.getElementById('toast');
  toast.textContent = texto;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 2200);
}

carregarItens();
</script>
</body>
</html>
